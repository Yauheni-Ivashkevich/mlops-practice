name: MLOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Шаг 1: Скачиваем актуальный код репозитория на виртуалку GitHub
    - name: Checkout repository
      uses: actions/checkout@v4

    # Шаг 2: Настраиваем Docker Buildx для умного кэширования слоев
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Шаг 3: Тестируем сборку Docker-образа
    - name: Build Docker Image
      run: |
        docker build -t emotion-classifier:latest .
        
    # Шаг 4: Проверяем контейнер на "живучесть" (Health Check)
    - name: Test Container Startup
      run: |
        docker run -d -p 8000:8000 --name test-api emotion-classifier:latest
        # Даем модели 15 секунд на прогрев и загрузку ONNX весов
        sleep 15
        # Пингуем наш эндпоинт. Если он вернет ошибку, шаг завалится
        curl --fail http://localhost:8000/health || exit 1
        # На всякий случай проверяем и классификацию базовым запросом
        curl -X POST "http://localhost:8000/classify" \
             -H "Content-Type: application/json" \
             -d '{"text": "CI pipeline works perfectly!"}' || exit 1
        docker stop test-api
